# ============================================================
#  DROCART FRONTEND — Nginx (static SPA, separate container)
#  Serves /css, /js, and HTML pages. No backend code here —
#  all data calls go directly from the browser to the backend
#  container's own URL (see index.html DROCART_API_BASE).
# ============================================================
worker_processes auto;
events { worker_connections 2048; }
http {
  include      mime.types;
  default_type application/octet-stream;
  sendfile on; tcp_nopush on; keepalive_timeout 65; server_tokens off;
  gzip on; gzip_vary on; gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache
    location /css/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /js/  { expires 1y; add_header Cache-Control "public, immutable"; }

    # Clean URL routing for the SPA "pages" the JS router understands.
    # Each path serves index.html, except /login & /signup which serve
    # the dedicated auth page (both rendered by the same auth.html file).
    location = /login  { try_files /auth.html =404; }
    location = /signup { try_files /auth.html =404; }

    # Everything else falls through to index.html; the SPA router in
    # index.html inspects location.pathname to decide what to render.
    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}
